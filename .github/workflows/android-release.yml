name: Android Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/outlier-release.jks"

      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/outlier-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease

      - name: Rename release artifact
        run: |
          cp app/build/outputs/apk/release/app-release.apk "outlier-${GITHUB_REF_NAME}-release.apk"
          sha256sum "outlier-${GITHUB_REF_NAME}-release.apk" > "outlier-${GITHUB_REF_NAME}-release.apk.sha256"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            outlier-${{ github.ref_name }}-release.apk
            outlier-${{ github.ref_name }}-release.apk.sha256
